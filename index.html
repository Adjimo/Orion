  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="belt">
        <span class="dot violet"></span>
        <span class="dot bigger gold"></span>
        <span class="dot orange"></span>
      </div>
      <div class="splash-title">Orion</div>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div id="app" class="app hidden">
    <main id="view"></main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Overlay PR -->
    <div id="pr-overlay" class="pr-overlay hidden">
      <div class="pr-card">
        <div class="pr-rays"></div>
        <div class="pr-trophy">🏆</div>
        <div class="pr-title">NEW PR</div>
        <div class="pr-subtitle">Record personnel battu</div>
        <div id="pr-list" class="pr-list"></div>
        <div class="dim text-xs mt-3">Tape pour fermer</div>
      </div>
    </div>
  </div>

  <!-- ===== TABBAR ===== -->
  <nav class="tabbar hidden" id="tabbar">
    <div class="tabbar-inner">
      <button class="tab" data-route="home" data-icon="tab-accueil">
        <img class="tab-icon" src="icons/ui/tab-accueil-mono.png?v=2" alt="">
        <span>Accueil</span>
      </button>
      <button class="tab" data-route="quetes" data-icon="tab-objectif">
        <img class="tab-icon" src="icons/ui/tab-objectif-mono.png?v=2" alt="">
        <span>Objectifs</span>
      </button>
      <button class="tab" data-route="sport" data-icon="tab-sport">
        <img class="tab-icon" src="icons/ui/tab-sport-mono.png?v=2" alt="">
        <span>Sport</span>
      </button>
      <button class="tab" data-route="stats" data-icon="tab-stats">
        <img class="tab-icon" src="icons/ui/tab-stats-mono.png?v=2" alt="">
        <span>Stats</span>
      </button>
      <button class="tab" data-route="profil" data-icon="tab-profil">
        <img class="tab-icon" src="icons/ui/tab-profil-mono.png?v=2" alt="">
        <span>Profil</span>
      </button>
    </div>
  </nav>

  <script src="app.js"></script>
  <script>
    // ── Service worker : enregistrement + mise à jour automatique.
    // Quand le SW signale qu'une nouvelle version est active (postMessage 'SW_ACTIVATED'),
    // on recharge la page UNE SEULE FOIS pour basculer sur la nouvelle version.
    // On expose aussi window.OrionSW pour la section "À propos" du Profil.
    if ('serviceWorker' in navigator) {
      let reloadGuard = false;

      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type === 'SW_ACTIVATED' && !reloadGuard) {
          reloadGuard = true;
          // Petit délai pour laisser l'app actuelle finir une éventuelle écriture.
          setTimeout(() => location.reload(), 600);
        }
      });

      // Si le contrôleur change pendant la session, on recharge aussi
      // (cas où skipWaiting prend la main sur un autre onglet).
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloadGuard) return;
        reloadGuard = true;
        setTimeout(() => location.reload(), 600);
      });

      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('sw.js');
          // Force un check de mise à jour à chaque chargement de la page.
          reg.update().catch(() => {});

          // Si un SW attend déjà (ancien tick a installé une nouvelle version
          // mais l'ancien SW est encore aux commandes), force le passage.
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
          // Idem pour toute future installation : dès qu'un SW finit son install,
          // on lui dit d'activer immédiatement.
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

          // API utilitaire pour la vue Profil.
          window.OrionSW = {
            registration: reg,
            // Récupère la version du SW. Plusieurs sources possibles, on retourne
            // la première qui répond. Strucutre : { version, source, state }.
            async getInfo() {
              const info = {
                version: null,
                source: null,
                state: 'inconnu',
                hasRegistration: !!reg,
                hasController: !!navigator.serviceWorker.controller
              };

              // 1. Tenter la communication directe avec le SW actif via postMessage.
              const askWorker = (worker) => new Promise((resolve) => {
                if (!worker) return resolve(null);
                try {
                  const channel = new MessageChannel();
                  let done = false;
                  const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, 1500);
                  channel.port1.onmessage = (e) => {
                    if (done) return;
                    done = true; clearTimeout(timer);
                    resolve(e.data?.version || null);
                  };
                  worker.postMessage({ type: 'GET_VERSION' }, [channel.port2]);
                } catch {
                  resolve(null);
                }
              });

              const candidates = [
                ['controller', navigator.serviceWorker.controller],
                ['active', reg?.active],
                ['waiting', reg?.waiting],
                ['installing', reg?.installing]
              ];
              for (const [src, worker] of candidates) {
                const v = await askWorker(worker);
                if (v) {
                  info.version = v;
                  info.source = src;
                  info.state = worker.state;
                  return info;
                }
              }

              // 2. Fallback robuste : on lit directement le fichier sw.js sur
              // le serveur et on en extrait la constante VERSION par regex.
              // Cela fonctionne même si le SW est muet, en attente, ou bugué.
              try {
                const resp = await fetch('sw.js?_=' + Date.now(), { cache: 'no-store' });
                if (resp.ok) {
                  const text = await resp.text();
                  const m = text.match(/VERSION\s*=\s*['"]([^'"]+)['"]/);
                  if (m) {
                    info.version = m[1];
                    info.source = 'fetched';
                    if (reg) {
                      const w = reg.active || reg.waiting || reg.installing;
                      info.state = w?.state || 'inconnu';
                    }
                    return info;
                  }
                }
              } catch {}

              // 3. Dernier recours : on a une registration mais aucune source
              // exploitable.
              if (reg) {
                const w = reg.active || reg.waiting || reg.installing;
                if (w) {
                  info.state = w.state;
                  info.source = reg.active ? 'active' : (reg.waiting ? 'waiting' : 'installing');
                  info.version = '(installé · version inconnue)';
                  return info;
                }
              }

              return info;
            },
            // Compat ancienne API (renvoie juste la string).
            async getVersion() {
              return (await this.getInfo()).version;
            },
            async clearCacheAndReload() {
              try {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(r => r.unregister()));
                if ('caches' in window) {
                  const keys = await caches.keys();
                  await Promise.all(keys.map(k => caches.delete(k)));
                }
              } catch {}
              location.reload();
            },
            async forceCheckUpdate() {
              try { await reg.update(); } catch {}
            }
          };
        } catch {}
      });
    } else {
      window.OrionSW = null;
    }
  </script>
</body>
</html>
