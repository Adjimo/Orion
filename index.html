<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Orion</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet (carte GPX) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Chart.js (graphiques) -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="belt">
        <span class="dot violet"></span>
        <span class="dot bigger gold"></span>
        <span class="dot orange"></span>
      </div>
      <div class="splash-title">ORION</div>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div id="app" class="app hidden">
    <main id="view"></main>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Overlay PR -->
    <div id="pr-overlay" class="pr-overlay hidden">
      <div class="pr-card">
        <div class="pr-rays"></div>
        <div class="pr-trophy">🏆</div>
        <div class="pr-title">NEW PR</div>
        <div class="pr-subtitle">Record personnel battu</div>
        <div id="pr-list" class="pr-list"></div>
        <div class="dim text-xs mt-3">Tape pour fermer</div>
      </div>
    </div>
  </div>

  <!-- ===== TABBAR ===== -->
  <nav class="tabbar hidden" id="tabbar">
    <div class="tabbar-inner">
      <button class="tab" data-route="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2V11z"/></svg>
        <span>Accueil</span>
      </button>
      <button class="tab" data-route="quetes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8"/><path d="M20 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        <span>Quêtes</span>
      </button>
      <button class="tab" data-route="sport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="2"/><path d="M5 22l3-7 4-2-2-5 5 4 4 1"/><path d="M9 13l-2 4"/></svg>
        <span>Sport</span>
      </button>
      <button class="tab" data-route="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg>
        <span>Stats</span>
      </button>
      <button class="tab" data-route="profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        <span>Profil</span>
      </button>
    </div>
  </nav>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
