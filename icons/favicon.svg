<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#1a2238"/>
      <stop offset="60%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#06080f"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#7c5cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffd86b" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffd86b" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ffd86b" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ffd86b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd86b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Arche dorée ouverte au sommet : le passage à franchir. -->
  <path d="M 36 14 A 18 18 0 1 0 28 14"
        fill="none"
        stroke="#ffd86b"
        stroke-width="2.4"
        stroke-linecap="round"/>

  <!-- Étoile dorée plus grosse, centrée à y=14 dans la brèche. -->
  <polygon points="32,7 33.6,14 32,21 30.4,14" fill="#ffd86b"/>
  <polygon points="25,14 32,12.5 39,14 32,15.5" fill="#ffd86b"/>
  <circle cx="32" cy="14" r="2" fill="#ffe999"/>

  <!-- Halo violet diffus autour du disque : matière dans la zone centrale
       sans toucher à la pureté du disque. -->
  <circle cx="32" cy="32" r="13" fill="url(#halo)"/>

  <!-- Disque violet plat au centre : potentiel condensé. Inchangé. -->
  <circle cx="32" cy="32" r="6" fill="#7c5cff"/>

  <!-- Ligne de fondation : le sol, ce sur quoi le seuil repose. -->
  <line x1="10" y1="48" x2="54" y2="48"
        stroke="url(#base)"
        stroke-width="1.6"
        stroke-linecap="round"/>
</svg>
