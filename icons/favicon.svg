<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#1a2238"/>
      <stop offset="60%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#06080f"/>
    </radialGradient>
    <linearGradient id="svA-up" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffe999"/>
      <stop offset="55%" stop-color="#ffd86b"/>
      <stop offset="100%" stop-color="#ffb547"/>
    </linearGradient>
    <linearGradient id="svA-dn" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffb547"/>
      <stop offset="100%" stop-color="#ff6a3d"/>
    </linearGradient>
    <linearGradient id="shA-l" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="shA-r" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ffb547"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Centre optique à y=33 (marges égales haut 6 / bas 11 pour conserver l'asymétrie A) -->
  <!-- Demi-branche haute (longue, claire) : 27 px -->
  <polygon points="32,6 35.5,33 28.5,33" fill="url(#svA-up)"/>
  <!-- Demi-branche basse (courte, foncée) : 20 px -->
  <polygon points="32,53 35.5,33 28.5,33" fill="url(#svA-dn)"/>
  <!-- Demi-branche gauche (courte, violet) -->
  <polygon points="11,33 32,30.5 32,35.5" fill="url(#shA-l)" opacity="0.9"/>
  <!-- Demi-branche droite (un peu plus longue, violet→or) -->
  <polygon points="56,33 32,30.5 32,35.5" fill="url(#shA-r)" opacity="0.9"/>

  <!-- Centre lumineux -->
  <circle cx="32" cy="33" r="3" fill="#ffd86b"/>
  <circle cx="32" cy="33" r="5.5" fill="#ffd86b" opacity="0.35"/>
</svg>
